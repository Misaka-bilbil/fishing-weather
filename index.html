<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>路亚天气 · 渔汛</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, 'SF Pro Text', 'SF Pro Display', 'Helvetica Neue', system-ui, 'Segoe UI', Roboto, sans-serif;
            background-color: #f5f5f7;
            color: #1d1d1f;
            line-height: 1.4;
            padding: 0 20px 40px;
        }

        /* 苹果风格容器 */
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        /* 顶部导航（极简） */
        .nav-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 0 10px;
            margin-bottom: 20px;
            border-bottom: 1px solid rgba(0,0,0,0.05);
        }
        .logo {
            font-size: 24px;
            font-weight: 600;
            letter-spacing: -0.3px;
            background: linear-gradient(135deg, #1e7e34, #0f5c26);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        .logo span {
            font-weight: 400;
            color: #86868b;
            background: none;
            -webkit-background-clip: unset;
            background-clip: unset;
        }
        .search-area {
            display: flex;
            gap: 12px;
            align-items: center;
        }
        .city-input {
            background: #ffffff;
            border: 1px solid #d2d2d7;
            border-radius: 980px;
            padding: 8px 16px;
            font-size: 15px;
            width: 200px;
            outline: none;
            transition: all 0.2s ease;
            font-family: inherit;
        }
        .city-input:focus {
            border-color: #007aff;
            box-shadow: 0 0 0 4px rgba(0,122,255,0.1);
        }
        .search-btn {
            background: #007aff;
            border: none;
            border-radius: 980px;
            padding: 8px 20px;
            font-size: 15px;
            font-weight: 500;
            color: white;
            cursor: pointer;
            transition: all 0.2s;
        }
        .search-btn:hover {
            background: #005fc1;
        }

        /* 主卡片（大圆角，白底，细腻阴影） */
        .card {
            background: #ffffff;
            border-radius: 28px;
            box-shadow: 0 8px 28px rgba(0,0,0,0.04), 0 0 0 1px rgba(0,0,0,0.02);
            padding: 32px 28px;
            margin-bottom: 28px;
            transition: all 0.3s ease;
        }

        /* 地点标题 */
        .location-title {
            font-size: 32px;
            font-weight: 600;
            letter-spacing: -0.5px;
            margin-bottom: 24px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .location-icon {
            font-size: 32px;
        }

        /* 三指标卡片（类似苹果健康指标） */
        .metrics-row {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            margin-bottom: 32px;
        }
        .metric-card {
            flex: 1;
            background: #f9f9fb;
            border-radius: 20px;
            padding: 20px 16px;
            text-align: center;
            transition: transform 0.2s;
        }
        .metric-value {
            font-size: 44px;
            font-weight: 600;
            color: #1d1d1f;
            letter-spacing: -1px;
            margin-bottom: 6px;
        }
        .metric-label {
            font-size: 15px;
            color: #6e6e73;
            font-weight: 500;
        }
        .metric-trend {
            font-size: 13px;
            margin-top: 8px;
            color: #8e8e93;
        }

        /* 详情网格（5项） */
        .detail-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
            gap: 16px;
            margin-bottom: 32px;
        }
        .detail-item {
            background: #f9f9fb;
            border-radius: 18px;
            padding: 14px 12px;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .detail-icon {
            font-size: 28px;
        }
        .detail-text h4 {
            font-size: 13px;
            color: #6e6e73;
            font-weight: 500;
            margin-bottom: 4px;
        }
        .detail-text p {
            font-size: 20px;
            font-weight: 600;
            color: #1d1d1f;
        }

        /* 建议区块（苹果风格列表） */
        .advice-block {
            background: #f9f9fb;
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 20px;
        }
        .advice-block h3 {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 12px;
            color: #1d1d1f;
        }
        .advice-text {
            font-size: 16px;
            line-height: 1.45;
            color: #424245;
        }

        /* 标点推荐列表 */
        .spot-list {
            display: flex;
            flex-wrap: wrap;
            gap: 16px;
            margin-top: 16px;
        }
        .spot-item {
            background: #ffffff;
            border-radius: 20px;
            padding: 16px;
            flex: 1;
            min-width: 180px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.04);
            border: 1px solid #e8e8ed;
        }
        .spot-name {
            font-weight: 600;
            font-size: 17px;
            margin-bottom: 6px;
        }
        .spot-desc {
            font-size: 14px;
            color: #6e6e73;
            line-height: 1.4;
        }

        /* 未来5天预测（水平滚动风格） */
        .forecast-section {
            margin-top: 28px;
        }
        .forecast-title {
            font-size: 22px;
            font-weight: 600;
            margin-bottom: 16px;
        }
        .forecast-scroll {
            display: flex;
            gap: 16px;
            overflow-x: auto;
            padding-bottom: 8px;
            scrollbar-width: thin;
        }
        .forecast-card {
            background: #f9f9fb;
            border-radius: 24px;
            padding: 20px 16px;
            min-width: 110px;
            text-align: center;
        }
        .forecast-day {
            font-weight: 500;
            margin-bottom: 8px;
        }
        .forecast-temp {
            font-size: 20px;
            font-weight: 600;
            margin: 8px 0;
        }
        .forecast-score {
            background: #e8e8ed;
            display: inline-block;
            padding: 4px 12px;
            border-radius: 30px;
            font-size: 13px;
            font-weight: 500;
        }

        /* 问答模块（苹果风格折叠面板） */
        .qa-card {
            background: #ffffff;
            border-radius: 28px;
            box-shadow: 0 8px 28px rgba(0,0,0,0.04);
            overflow: hidden;
            margin-top: 28px;
        }
        .qa-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 28px;
            cursor: pointer;
            border-bottom: 1px solid #e8e8ed;
        }
        .qa-header h2 {
            font-size: 20px;
            font-weight: 600;
        }
        .qa-toggle {
            font-size: 24px;
            background: none;
            border: none;
            cursor: pointer;
            color: #8e8e93;
        }
        .qa-content {
            display: none;
            padding: 20px 28px 28px;
            background: #ffffff;
        }
        .qa-content.show {
            display: block;
        }
        .chat-window {
            background: #f9f9fb;
            border-radius: 24px;
            padding: 20px;
            max-height: 400px;
            overflow-y: auto;
        }
        .chat-message {
            margin-bottom: 20px;
        }
        .chat-question {
            background: #e8e8ed;
            align-self: flex-end;
            padding: 10px 16px;
            border-radius: 20px 20px 4px 20px;
            max-width: 85%;
            margin-left: auto;
            width: fit-content;
            font-size: 15px;
        }
        .chat-answer {
            background: #ffffff;
            align-self: flex-start;
            padding: 10px 16px;
            border-radius: 20px 20px 20px 4px;
            max-width: 85%;
            margin-top: 8px;
            border: 1px solid #e8e8ed;
            font-size: 15px;
            line-height: 1.45;
            white-space: pre-wrap;
        }
        .chat-input-area {
            display: flex;
            gap: 12px;
            margin-top: 20px;
        }
        .chat-input {
            flex: 1;
            background: #f9f9fb;
            border: 1px solid #d2d2d7;
            border-radius: 980px;
            padding: 12px 18px;
            font-size: 15px;
            outline: none;
            font-family: inherit;
        }
        .chat-input:focus {
            border-color: #007aff;
        }
        .chat-send {
            background: #007aff;
            border: none;
            border-radius: 980px;
            padding: 0 24px;
            font-size: 15px;
            font-weight: 500;
            color: white;
            cursor: pointer;
        }
        .chat-send:hover {
            background: #005fc1;
        }

        footer {
            text-align: center;
            margin-top: 40px;
            font-size: 13px;
            color: #8e8e93;
            padding: 20px 0;
        }

        @media (max-width: 740px) {
            body {
                padding: 0 16px 32px;
            }
            .nav-bar {
                flex-direction: column;
                gap: 12px;
                align-items: stretch;
            }
            .search-area {
                justify-content: flex-end;
            }
            .city-input {
                width: 100%;
            }
            .metrics-row {
                flex-direction: column;
            }
            .detail-grid {
                grid-template-columns: 1fr 1fr;
            }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="nav-bar">
        <div class="logo">路亚<span>·</span>渔汛</div>
        <div class="search-area">
            <input type="text" id="cityInput" class="city-input" placeholder="搜索城市，如 温州市" value="温州市">
            <button id="searchBtn" class="search-btn">更新</button>
        </div>
    </div>

    <div id="mainContent">
        <div class="card" style="text-align:center; padding:60px 20px;">
            <div>🎣 加载天气数据中...</div>
        </div>
    </div>

    <!-- 路亚智囊问答模块 -->
    <div class="qa-card">
        <div class="qa-header" id="qaHeader">
            <h2>🎙️ 路亚智囊 · 装备与技巧问答</h2>
            <button class="qa-toggle" id="qaToggle">▼</button>
        </div>
        <div class="qa-content" id="qaContent">
            <div class="chat-window" id="chatWindow">
                <div class="chat-message">
                    <div class="chat-answer">👋 你好，我是路亚智囊。可以问我装备选择、钓点策略、天气影响等问题。<br>例如：<br>• 新手500元买什么装备？<br>• 水滴轮和纺车轮怎么选？<br>• 炸水不上鱼怎么办？<br>直接输入问题，我会尽力解答。</div>
                </div>
            </div>
            <div class="chat-input-area">
                <input type="text" class="chat-input" id="chatInput" placeholder="输入你的问题...">
                <button class="chat-send" id="chatSend">发送</button>
            </div>
            <p style="font-size:12px; color:#8e8e93; margin-top:12px;">基于本地知识库，无需联网，秒回专业建议</p>
        </div>
    </div>
    <footer>数据来源 Open-Meteo 气象模型 | 标点推荐基于典型水域 | 路亚智囊离线知识库</footer>
</div>

<script>
    // ======================== 路亚知识库（装备 + 作钓） ========================
    const gearKnowledge = [
        { keywords: ["500元", "500块", "入门预算", "新手预算", "便宜套装"], answer: "💰 新手500元预算推荐：\n✅ 竿：钓之屋 潜龙（UL/L）约150元\n✅ 轮：光威小黄轮（纺车）约80元\n✅ 线：PE0.6号+2号碳前导 约50元\n✅ 饵：亮片、铅头钩套餐 约100元\n✅ 剩余买控鱼器、路亚钳\n🎯 目标鱼：马口、白条、小翘嘴" },
        { keywords: ["1000元", "一千元", "千元预算"], answer: "💰 1000元进阶推荐：\n✅ 竿：NS米兰达（ML）约400元\n✅ 轮：钓之屋精英（纺车）或阿布复仇（水滴）约400元\n✅ 线：PE0.8号+3号碳前导\n✅ 饵：VIB、米诺、波爬、软虫套餐\n🎯 可钓翘嘴、红尾、青梢" },
        { keywords: ["2000元", "两千元", "高端预算"], answer: "💰 2000元专业级推荐：\n✅ 竿：达亿瓦 一击（ML/M）约800元\n✅ 轮：禧玛诺纳西（纺车）或达亿瓦蜘蛛（水滴）约1000元\n✅ 线：YGK PE1.0号+西格碳线\n✅ 饵：各类品牌硬饵+软虫\n🎯 适用全鱼种" },
        { keywords: ["水滴轮", "纺车轮", "选哪个", "区别"], answer: "🎯 水滴轮 vs 纺车轮：\n✅ 水滴轮：精准抛投、快速搜索、易炸线（需练习）\n✅ 纺车轮：易上手、不炸线、适合轻饵远投\n💡 新手建议先入纺车轮" },
        { keywords: ["新手", "第一套", "入门装备"], answer: "🎣 新手第一套路亚装备：\n✅ 直柄纺车套装，长度1.98-2.1m，L/ML硬度\n✅ 2000型纺车轮\n✅ PE0.6号+2号碳前导\n✅ 饵：亮片、铅头钩+软虫、小胖子\n💰 预算300-500元" },
        { keywords: ["翘嘴装备", "钓翘嘴用什么竿"], answer: "🐟 翘嘴装备：\n✅ ML硬度，2.1-2.4m，快调或中快调\n✅ 2500型纺车轮或水滴轮\n✅ PE0.8-1.0号+3号碳前导\n✅ 饵：亮片(7-15g)、米诺、VIB、波爬" },
        { keywords: ["黑鱼装备", "雷强装备"], answer: "🐍 雷强（黑鱼）装备：\n✅ H或XH硬度，2.1-2.4m雷强竿\n✅ 强力水滴轮或鼓轮\n✅ PE5-8号\n✅ 雷蛙，草区作钓，暴力刺鱼" },
        { keywords: ["鳜鱼装备", "桂鱼装备"], answer: "🐡 鳜鱼装备：\n✅ L或ML硬度，1.98-2.1m，超快调\n✅ 1000-2000型纺车轮或微物水滴\n✅ PE0.6-0.8号+2号碳前导\n✅ 铅头钩+卷尾蛆(3-5g)、VIB" },
        { keywords: ["国产品牌", "便宜好用"], answer: "🇨🇳 国产高性价比品牌：\n✅ 竿：钓之屋、NS、科尼、领峰\n✅ 轮：光威、钓之屋、阿布(国产)\n✅ 线：桑濑、YGK、百事德\n✅ 饵：蓝旗鱼、大河奔流、疯狂路亚" },
        { keywords: ["进口品牌", "大牌"], answer: "🌍 进口大牌：\n✅ 竿：G.Loomis、St. Croix、禧玛诺、达亿瓦\n✅ 轮：禧玛诺、达亿瓦、阿布高端\n✅ 线：YGK、西格、瓦里瓦斯\n✅ 饵：Megabass、Jackall、EverGreen" },
        { keywords: ["调性", "快调", "慢调"], answer: "🎣 路亚竿调性：\n✅ 快调：感度高，适合软虫跳底\n✅ 中快调：泛用，适合硬饵\n✅ 慢调：适合三本钩硬饵\n💡 新手选中快调" },
        { keywords: ["硬度", "ML", "M", "H"], answer: "📏 硬度选择：\n✅ UL：微物（马口）\n✅ L：小翘嘴、鳜鱼\n✅ ML：泛用（翘嘴、红尾）\n✅ M：大翘嘴、鲈鱼\n✅ MH：雷强\n💡 新手建议ML" },
        { keywords: ["保养", "清洗", "上油"], answer: "🛠️ 装备保养：\n✅ 轮子：淡水冲洗，阴干，轴承每3个月上油\n✅ 竿子：湿布擦净，检查导环\n✅ 饵：钩子涂防锈油\n✅ 线：PE线定期剪前端" }
    ];

    const generalKnowledge = [
        { keywords: ["炸水", "不上鱼", "有鱼不咬"], answer: "🐟 炸水不上鱼原因：\n1️⃣ 鱼攻击真鱼苗→换小饵\n2️⃣ 饵速太快→放慢\n3️⃣ 钩钝→换钩\n4️⃣ 鱼驱赶→换软虫打下层\n5️⃣ 饵型不对→用水面系" },
        { keywords: ["气压", "多少合适"], answer: "📈 最佳气压：995~1008hPa。气压下降→黄金窗口；上升→口差" },
        { keywords: ["窗口期", "什么时候好钓"], answer: "⏰ 窗口期：清晨5-8点，傍晚5-7点，气压下降前1-2小时，小雨阴天" },
        { keywords: ["风向", "风大"], answer: "💨 大风天：选背风湾，用重型饵(15g+)，复合亮片，下风口鱼活跃" },
        { keywords: ["水浑", "水清"], answer: "🌊 水浑：亮片、复合亮片、金色红色饵；水清：自然色软虫、米诺，细线" },
        { keywords: ["雷强", "打黑"], answer: "🐍 雷强：H或XH竿，PE5-8号，雷蛙，草区，炸水等1-2秒暴力刺鱼" },
        { keywords: ["马口", "小溪"], answer: "🐟 马口：UL竿，1-3g亮片，急流浅滩，快速收线" },
        { keywords: ["前导线", "碳线"], answer: "🧵 前导线：PE+碳线(1.5-3米)，GT结或FG结" },
        { keywords: ["水滴轮炸线", "炒粉"], answer: "🎯 炸线解决：调机械刹车和磁力刹车，拇指控线，侧抛练习" },
        { keywords: ["夏季路亚", "高温"], answer: "☀️ 夏季：清晨傍晚出钓，深水结构，深潜米诺、VIB" },
        { keywords: ["冬季路亚", "低温"], answer: "❄️ 冬季：中午窗口，深水陡坡，小克数铅头钩，慢收" }
    ];

    function getAnswer(question) {
        const lowerQ = question.toLowerCase();
        for (let item of gearKnowledge) {
            for (let kw of item.keywords) {
                if (lowerQ.includes(kw.toLowerCase())) return item.answer;
            }
        }
        for (let item of generalKnowledge) {
            for (let kw of item.keywords) {
                if (lowerQ.includes(kw.toLowerCase())) return item.answer;
            }
        }
        return "🤔 暂时未收录这个问题，可以换个问法，例如：“新手500元预算”、“水滴轮纺车轮区别”、“炸水不上鱼”。";
    }

    // ======================== 天气代码 (Open-Meteo) ========================
    const DEFAULT_LAT = 28.0027;
    const DEFAULT_LON = 120.5881;
    const DEFAULT_NAME = "温州市";
    let currentLat = DEFAULT_LAT, currentLon = DEFAULT_LON, currentCityName = DEFAULT_NAME;
    const mainContent = document.getElementById('mainContent');
    const cityInput = document.getElementById('cityInput');
    const searchBtn = document.getElementById('searchBtn');

    function getWeatherDesc(code) {
        const codes = {
            0:{text:"晴天",icon:"☀️"},1:{text:"晴间多云",icon:"🌤️"},2:{text:"局部多云",icon:"⛅"},3:{text:"多云",icon:"☁️"},
            45:{text:"雾",icon:"🌫️"},48:{text:"雾",icon:"🌫️"},51:{text:"毛毛雨",icon:"🌦️"},53:{text:"毛毛雨",icon:"🌦️"},
            55:{text:"毛毛雨",icon:"🌦️"},56:{text:"冻雨",icon:"❄️"},57:{text:"冻雨",icon:"❄️"},61:{text:"小雨",icon:"🌧️"},
            63:{text:"中雨",icon:"🌧️"},65:{text:"大雨",icon:"🌧️"},66:{text:"冻雨",icon:"❄️"},67:{text:"冻雨",icon:"❄️"},
            71:{text:"小雪",icon:"❄️"},73:{text:"中雪",icon:"❄️"},75:{text:"大雪",icon:"❄️"},77:{text:"雪粒",icon:"❄️"},
            80:{text:"阵雨",icon:"🌦️"},81:{text:"阵雨",icon:"🌦️"},82:{text:"强阵雨",icon:"⛈️"},85:{text:"阵雪",icon:"❄️"},
            86:{text:"阵雪",icon:"❄️"},95:{text:"雷暴",icon:"⛈️"},96:{text:"雷暴伴冰雹",icon:"⛈️"},99:{text:"雷暴伴冰雹",icon:"⛈️"}
        };
        return codes[code] || { text: "未知", icon: "❓" };
    }

    function calculateLureIndex(temp, wind, hum, press, trend) {
        let s = 45;
        if(temp>=16&&temp<=26) s+=16; else if(temp>=12&&temp<16) s+=6; else if(temp>26&&temp<=30) s+=2; else if(temp>30) s-=18; else if(temp<12&&temp>=8) s-=8; else if(temp<8) s-=22;
        if(wind>=3&&wind<=12) s+=14; else if(wind>12&&wind<=20) s+=2; else if(wind>20&&wind<=28) s-=12; else if(wind>28) s-=22; else if(wind<3) s-=4;
        if(hum>=45&&hum<=70) s+=8; else if(hum>70&&hum<=85) s-=6; else if(hum>85) s-=16; else if(hum<45) s-=4;
        if(trend==='falling') s+=22; else if(trend==='rising') s-=20;
        if(press>=995&&press<=1008) s+=10; else if(press>1008&&press<=1018) s-=4; else if(press>1018) s-=14; else if(press<995&&press>=980) s-=6; else if(press<980) s-=18;
        return Math.min(100, Math.max(0, Math.round(s)));
    }

    function getPressureTrend(hourlyPress, idx) {
        if(!hourlyPress||hourlyPress.length===0) return 'stable';
        const now = hourlyPress[idx];
        const future = hourlyPress[Math.min(idx+3, hourlyPress.length-1)];
        if(future < now) return 'falling';
        if(future > now) return 'rising';
        return 'stable';
    }

    function getLureAdvice(score,temp,wind,trend){
        let fishActive, lureText, spotText;
        if(score>=75){ fishActive="🔥 黄金窗口！路亚目标鱼极度活跃，炸水概率高。"; lureText="水面系（波爬、之字狗）、米诺、VIB，快速搜索。"; spotText="浅滩、草区边缘、结构区、入水口。"; }
        else if(score>=60){ fishActive="👍 鱼情较好，窗口期可抓住。"; lureText="亮片、软虫（德州/倒吊）、小胖子（Crank）。"; spotText="深浅交界处、桥墩、乱石区。"; }
        else if(score>=40){ fishActive="🤔 活性一般，需要精细作钓。"; lureText="小克数铅头钩+卷尾蛆、无铅软虫、内德。"; spotText="深水结构、障碍区边缘，慢拖轻跳。"; }
        else{ fishActive="⚠️ 鱼口很差，建议休息或夜钓。"; lureText="极小尺寸软虫、悬浮米诺，极致慢收。"; spotText="最深处或出水口，尝试夜钓。"; }
        if(temp>30){ fishActive+=" 高温，鱼多躲深水，建议清晨/傍晚出钓。"; lureText+=" 深水层可用金属VIB、铁板。"; }
        else if(temp<8){ fishActive+=" 低温，鱼活性低，找缓流深水。"; lureText+=" 小亮片、小铅头钩慢跳。"; }
        if(wind>20){ spotText+=" 风大时背风岸、湾子内是标点。"; lureText+=" 可使用重型铅头钩或 spinnerbait。"; }
        return { fishActive, lureText, spotText };
    }

    function getSpotRecommendations(cityName,score){
        let base = [];
        if(cityName.includes("温州")||cityName.includes("宁波")||cityName.includes("台州")) base = [{name:"瓯江沿岸",desc:"缓流区、桥墩下、回水湾"},{name:"三垟湿地",desc:"芦苇荡、荷花池"},{name:"楠溪江",desc:"流水结构，VIB、亮片"}];
        else if(cityName.includes("杭州")) base = [{name:"千岛湖",desc:"大水面，早晚窗口期"},{name:"富春江",desc:"流水区，小胖子、米诺"},{name:"湘湖",desc:"静水，亮片、水面系"}];
        else if(cityName.includes("上海")) base = [{name:"淀山湖",desc:"入水口、浅滩草区"},{name:"崇明北沿",desc:"潮汐影响，海鲈标点"},{name:"滴水湖",desc:"人工湖，沿岸结构"}];
        else if(cityName.includes("广州")||cityName.includes("佛山")) base = [{name:"珠江支流",desc:"缓流、桥底"},{name:"白云湖",desc:"浅草区"},{name:"海珠湿地",desc:"荷花池、芦苇边"}];
        else if(cityName.includes("北京")) base = [{name:"怀柔截流",desc:"山间溪流"},{name:"官厅水库",desc:"大水面深浅交界"},{name:"护城河",desc:"城市河道，夜钓"}];
        else base = [{name:"河流缓流区",desc:"桥墩下游、回水湾"},{name:"水库大坝附近",desc:"深水结构"},{name:"湿地/湖泊草区",desc:"草洞边缘"}];
        if(score>=70) base.forEach(s=>s.desc+=" 窗口期可重点突击。");
        else if(score<=35) base.forEach(s=>s.desc+=" 建议找深水或障碍区精细作钓。");
        return base;
    }

    async function fetchWeather(lat,lon){
        const url = `https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current_weather=true&hourly=pressure_msl,temperature_2m,relativehumidity_2m,windspeed_10m&daily=weathercode,temperature_2m_max,temperature_2m_min,windspeed_10m_max&timezone=Asia/Shanghai&forecast_days=7`;
        const res = await fetch(url);
        if(!res.ok) throw new Error(`HTTP ${res.status}`);
        return res.json();
    }

    function getDailyNoonData(hourly,target){
        for(let i=0;i<hourly.time.length;i++) if(hourly.time[i].includes(`${target}T12:00`)) return {pressure:hourly.pressure_msl[i],temp:hourly.temperature_2m[i],humidity:hourly.relativehumidity_2m[i],wind:hourly.windspeed_10m[i]};
        return null;
    }

    async function renderUI(weatherData,cityName){
        const current = weatherData.current_weather;
        const hourly = weatherData.hourly;
        const daily = weatherData.daily;
        const wdesc = getWeatherDesc(current.weathercode);
        const now = new Date();
        const curHourStr = now.getFullYear()+'-'+String(now.getMonth()+1).padStart(2,'0')+'-'+String(now.getDate()).padStart(2,'0')+'T'+String(now.getHours()).padStart(2,'0')+':00';
        let idx = hourly.time.findIndex(t=>t===curHourStr);
        if(idx===-1) idx=0;
        const press = hourly.pressure_msl[idx];
        const temp = current.temperature;
        const wind = current.windspeed;
        const hum = hourly.relativehumidity_2m[idx];
        const trend = getPressureTrend(hourly.pressure_msl, idx);
        const trendText = trend==='falling'?'↓ 下降 (窗口期)':(trend==='rising'?'↑ 上升 (鱼情谨慎)':'→ 平稳');
        const score = calculateLureIndex(temp,wind,hum,press,trend);
        const { fishActive, lureText, spotText } = getLureAdvice(score,temp,wind,trend);
        const spots = getSpotRecommendations(cityName, score);

        const mainHtml = `
            <div class="card">
                <div class="location-title">
                    <span class="location-icon">🎯</span> ${cityName} · 渔汛预报
                </div>
                <div class="metrics-row">
                    <div class="metric-card"><div class="metric-value">${score}</div><div class="metric-label">路亚指数</div><div class="metric-trend">0-100</div></div>
                    <div class="metric-card"><div class="metric-value">${press} hPa</div><div class="metric-label">气压 · ${trendText}</div></div>
                    <div class="metric-card"><div class="metric-value">${temp}°C</div><div class="metric-label">实时气温</div></div>
                </div>
                <div class="detail-grid">
                    <div class="detail-item"><div class="detail-icon">${wdesc.icon}</div><div class="detail-text"><h4>天气</h4><p>${wdesc.text}</p></div></div>
                    <div class="detail-item"><div class="detail-icon">💨</div><div class="detail-text"><h4>风速</h4><p>${wind} km/h</p></div></div>
                    <div class="detail-item"><div class="detail-icon">💧</div><div class="detail-text"><h4>湿度</h4><p>${hum}%</p></div></div>
                    <div class="detail-item"><div class="detail-icon">🌡️</div><div class="detail-text"><h4>水温参考</h4><p>${Math.round(temp-1)}°C</p></div></div>
                    <div class="detail-item"><div class="detail-icon">⏱️</div><div class="detail-text"><h4>气压趋势</h4><p>${trend==='falling'?'未来3小时下降':(trend==='rising'?'未来3小时上升':'平稳')}</p></div></div>
                </div>
                <div class="advice-block"><h3>🐟 鱼情分析</h3><div class="advice-text">${fishActive}</div></div>
                <div class="advice-block"><h3>🎣 路亚贴士</h3><div class="advice-text">${lureText}<br>📍 ${spotText}</div></div>
                <div class="advice-block"><h3>🎯 附近标点推荐</h3><div class="spot-list">${spots.map(s=>`<div class="spot-item"><div class="spot-name">📍 ${s.name}</div><div class="spot-desc">${s.desc}</div></div>`).join('')}</div></div>
            </div>
            <div class="forecast-section"><div class="forecast-title">📅 未来5天路亚指数趋势</div><div class="forecast-scroll" id="forecastScroll"></div></div>
        `;
        mainContent.innerHTML = mainHtml;

        // 未来5天渲染
        const forecastDiv = document.getElementById('forecastScroll');
        let forecastHtml = '';
        const days = Math.min(5, daily.time.length);
        for(let i=0;i<days;i++){
            const dateStr = daily.time[i];
            const dateObj = new Date(dateStr);
            const weekName = ['周日','周一','周二','周三','周四','周五','周六'][dateObj.getDay()];
            const displayDate = `${dateObj.getMonth()+1}/${dateObj.getDate()} (${weekName})`;
            const tMax = daily.temperature_2m_max[i];
            const tMin = daily.temperature_2m_min[i];
            const noon = getDailyNoonData(hourly, dateStr);
            let dayScore = 50;
            if(noon){
                let next = null;
                if(i+1<days) next = getDailyNoonData(hourly, daily.time[i+1]);
                let dayTrend = 'stable';
                if(next && next.pressure) dayTrend = next.pressure<noon.pressure?'falling':(next.pressure>noon.pressure?'rising':'stable');
                dayScore = calculateLureIndex(noon.temp, noon.wind, noon.humidity, noon.pressure, dayTrend);
            }
            let desc = dayScore>=70?'🎣 很适宜':(dayScore>=50?'⛅ 尚可':(dayScore>=30?'⚠️ 一般':'❌ 不佳'));
            forecastHtml += `<div class="forecast-card"><div class="forecast-day">${displayDate}</div><div class="forecast-temp">${tMin}~${tMax}°C</div><div class="forecast-score">🎣 ${dayScore}分</div><div style="font-size:13px; margin-top:8px;">${desc}</div></div>`;
        }
        forecastDiv.innerHTML = forecastHtml;
    }

    async function getCoordinates(city){
        const url = `https://geocoding-api.open-meteo.com/v1/search?name=${encodeURIComponent(city)}&count=1&language=zh`;
        const res = await fetch(url);
        const data = await res.json();
        if(!data.results || data.results.length===0) throw new Error(`未找到城市“${city}”，请带“市”字`);
        const r = data.results[0];
        return { lat: r.latitude, lon: r.longitude, name: `${r.name}${r.admin1?' · '+r.admin1:''}` };
    }

    async function loadWeatherByCity(city){
        mainContent.innerHTML = '<div class="card" style="text-align:center; padding:60px 20px;">🔍 获取气象数据...</div>';
        try{
            const coord = await getCoordinates(city);
            currentLat = coord.lat; currentLon = coord.lon; currentCityName = coord.name;
            const weather = await fetchWeather(currentLat, currentLon);
            await renderUI(weather, currentCityName);
        }catch(e){
            mainContent.innerHTML = `<div class="card" style="background:#fff0f0;"><div class="location-title">⚠️ 错误</div><p>${e.message}<br>已回退至温州市</p></div>`;
            if(city !== DEFAULT_NAME) loadWeatherByCity(DEFAULT_NAME);
        }
    }

    loadWeatherByCity(DEFAULT_NAME);
    searchBtn.onclick = () => { let q = cityInput.value.trim(); if(q) loadWeatherByCity(q); else alert("请输入城市名"); };
    cityInput.onkeypress = e => { if(e.key === 'Enter') searchBtn.click(); };

    // ======================== 问答交互 ========================
    const qaHeader = document.getElementById('qaHeader');
    const qaContent = document.getElementById('qaContent');
    const qaToggle = document.getElementById('qaToggle');
    const chatWindow = document.getElementById('chatWindow');
    const chatInput = document.getElementById('chatInput');
    const chatSend = document.getElementById('chatSend');

    let qaOpen = true;
    qaHeader.addEventListener('click', () => {
        qaOpen = !qaOpen;
        qaContent.classList.toggle('show', qaOpen);
        qaToggle.textContent = qaOpen ? '▼' : '▲';
    });
    qaContent.classList.add('show');

    function addMessage(question, answer) {
        const msgDiv = document.createElement('div');
        msgDiv.className = 'chat-message';
        msgDiv.innerHTML = `<div class="chat-question">❓ ${escapeHtml(question)}</div><div class="chat-answer">🤖 ${escapeHtml(answer)}</div>`;
        chatWindow.appendChild(msgDiv);
        chatWindow.scrollTop = chatWindow.scrollHeight;
    }
    function escapeHtml(str) { return str.replace(/[&<>]/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;'}[m])); }

    function handleQuestion() {
        let q = chatInput.value.trim();
        if(!q) return;
        const tempDiv = document.createElement('div');
        tempDiv.className = 'chat-message';
        tempDiv.innerHTML = `<div class="chat-question">❓ ${escapeHtml(q)}</div><div class="chat-answer" id="loadingAnswer">🤖 思考中...</div>`;
        chatWindow.appendChild(tempDiv);
        chatWindow.scrollTop = chatWindow.scrollHeight;
        chatInput.value = '';
        const answer = getAnswer(q);
        setTimeout(() => {
            const loadingDiv = tempDiv.querySelector('#loadingAnswer');
            if(loadingDiv) loadingDiv.innerHTML = `🤖 ${escapeHtml(answer)}`;
            else addMessage(q, answer);
        }, 50);
    }
    chatSend.addEventListener('click', handleQuestion);
    chatInput.addEventListener('keypress', e => { if(e.key === 'Enter') handleQuestion(); });
</script>
</body>
</html>
