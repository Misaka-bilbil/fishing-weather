<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>路亚天气 · 渔汛</title>
    <meta name="theme-color" id="themeColor" content="#f5f5f7">
    <!-- 禁止缓存 -->
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <!-- Leaflet CSS & JS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <style>
        /* 样式与上一版相同，为了节省篇幅此处省略，但为了完整性，我会包含完整样式 */
        :root {
            --bg-color: #f5f5f7;
            --card-bg: #ffffff;
            --text-primary: #1d1d1f;
            --text-secondary: #6e6e73;
            --border-light: #e8e8ed;
            --metric-bg: #f9f9fb;
            --button-bg: #007aff;
            --button-hover: #005fc1;
            --shadow: 0 8px 28px rgba(0,0,0,0.04), 0 0 0 1px rgba(0,0,0,0.02);
            --modal-overlay: rgba(0,0,0,0.4);
        }
        body.dark {
            --bg-color: #1c1c1e;
            --card-bg: #2c2c2e;
            --text-primary: #ffffff;
            --text-secondary: #98989e;
            --border-light: #3a3a3c;
            --metric-bg: #3a3a3c;
            --shadow: 0 8px 28px rgba(0,0,0,0.2);
            --modal-overlay: rgba(0,0,0,0.7);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, 'SF Pro Text', 'Helvetica Neue', system-ui, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-primary);
            line-height: 1.4;
            padding: 0 16px 40px;
            transition: background-color 0.2s, color 0.2s;
        }
        .container { max-width: 1200px; margin: 0 auto; }
        .nav-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px 0 12px;
            margin-bottom: 16px;
            border-bottom: 1px solid var(--border-light);
            flex-wrap: wrap;
            gap: 12px;
        }
        .logo {
            font-size: 24px;
            font-weight: 600;
            background: linear-gradient(135deg, #1e7e34, #0f5c26);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        .actions { display: flex; gap: 12px; align-items: center; flex-wrap: wrap; }
        .dark-toggle {
            background: var(--metric-bg);
            border: none;
            border-radius: 30px;
            padding: 8px 16px;
            font-size: 14px;
            cursor: pointer;
            color: var(--text-primary);
        }
        .search-area { display: flex; gap: 8px; }
        .city-input {
            background: var(--card-bg);
            border: 1px solid var(--border-light);
            border-radius: 980px;
            padding: 8px 16px;
            font-size: 15px;
            width: 200px;
            outline: none;
            color: var(--text-primary);
        }
        .search-btn {
            background: var(--button-bg);
            border: none;
            border-radius: 980px;
            padding: 8px 20px;
            font-size: 15px;
            font-weight: 500;
            color: white;
            cursor: pointer;
        }
        .card {
            background: var(--card-bg);
            border-radius: 28px;
            box-shadow: var(--shadow);
            padding: 20px;
            margin-bottom: 20px;
        }
        .metrics-row {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            margin-bottom: 20px;
        }
        .metric-card {
            flex: 1;
            background: var(--metric-bg);
            border-radius: 20px;
            padding: 16px;
            text-align: center;
        }
        .metric-value { font-size: 34px; font-weight: 600; }
        .metric-label { font-size: 14px; color: var(--text-secondary); margin-top: 6px; }
        .detail-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(130px, 1fr));
            gap: 12px;
            margin-bottom: 20px;
        }
        .detail-item {
            background: var(--metric-bg);
            border-radius: 18px;
            padding: 12px;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .detail-icon { font-size: 28px; }
        .detail-text h4 { font-size: 12px; color: var(--text-secondary); margin-bottom: 4px; }
        .detail-text p { font-size: 18px; font-weight: 600; }
        .chart-container { margin: 16px 0; background: var(--metric-bg); border-radius: 20px; padding: 16px; }
        canvas { max-height: 220px; width: 100%; }
        .advice-block { background: var(--metric-bg); border-radius: 20px; padding: 16px; margin-top: 12px; }
        .calendar-title { font-size: 18px; font-weight: 600; margin-bottom: 12px; display: flex; align-items: center; gap: 8px; }
        .calendar-scroll { display: flex; gap: 12px; overflow-x: auto; padding-bottom: 8px; scrollbar-width: thin; }
        .calendar-card {
            background: var(--metric-bg);
            border-radius: 24px;
            padding: 14px;
            min-width: 110px;
            text-align: center;
            flex-shrink: 0;
            position: relative;
            cursor: pointer;
        }
        .cal-date { font-weight: 600; font-size: 16px; }
        .cal-week { font-size: 13px; color: var(--text-secondary); margin-bottom: 6px; }
        .cal-icon { font-size: 28px; margin: 8px 0; }
        .cal-temp { font-size: 14px; margin-bottom: 6px; }
        .cal-score { background: var(--card-bg); display: inline-block; padding: 4px 8px; border-radius: 30px; font-size: 12px; font-weight: 500; }
        .holiday-tag { position: absolute; top: 8px; right: 8px; font-size: 12px; color: white; padding: 2px 6px; border-radius: 20px; font-weight: 500; }
        .map-container { margin: 12px 0; background: var(--metric-bg); border-radius: 20px; overflow: hidden; height: 280px; }
        #map { height: 100%; width: 100%; }
        .message-board { background: var(--metric-bg); border-radius: 20px; padding: 16px; margin-top: 8px; }
        .message-list { max-height: 350px; overflow-y: auto; margin-bottom: 16px; }
        .message-item { background: var(--card-bg); border-radius: 18px; padding: 12px; margin-bottom: 12px; border: 1px solid var(--border-light); }
        .message-header { display: flex; justify-content: space-between; margin-bottom: 8px; font-size: 13px; color: var(--text-secondary); }
        .message-nickname { font-weight: 600; color: var(--text-primary); }
        .message-time { font-size: 12px; }
        .message-content { font-size: 14px; line-height: 1.4; }
        .post-btn { background: var(--button-bg); border: none; border-radius: 30px; padding: 10px; color: white; cursor: pointer; width: 100%; font-size: 15px; }
        footer { text-align: center; margin-top: 20px; font-size: 12px; color: var(--text-secondary); }
        .refresh-indicator { text-align: center; font-size: 12px; padding: 8px; color: var(--text-secondary); transition: opacity 0.2s; }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); backdrop-filter: blur(4px); justify-content: center; align-items: center; z-index: 1000; }
        .modal-content { background: var(--card-bg); border-radius: 32px; max-width: 800px; width: 90%; max-height: 85vh; overflow-y: auto; padding: 24px; position: relative; }
        .modal-close { position: absolute; top: 16px; right: 20px; font-size: 28px; cursor: pointer; }
        @media (max-width: 640px) {
            body { padding: 0 12px 32px; }
            .nav-bar { flex-direction: column; align-items: stretch; }
            .actions { justify-content: flex-end; }
            .search-area { width: 100%; }
            .city-input { flex: 1; }
            .detail-grid { grid-template-columns: 1fr 1fr; }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="nav-bar">
        <div class="logo">路亚 · 渔汛</div>
        <div class="actions">
            <button class="dark-toggle" id="darkToggle">🌙 暗黑</button>
            <div class="search-area">
                <input type="text" id="cityInput" class="city-input" placeholder="搜索城市，如 温州市" value="温州市">
                <button id="searchBtn" class="search-btn">更新</button>
            </div>
        </div>
    </div>
    <div id="refreshIndicator" class="refresh-indicator" style="opacity:0;">↓ 下拉刷新</div>
    <div id="mainContent"></div>

    <!-- 地图卡片 -->
    <div class="card">
        <h3 style="margin-bottom: 8px;">🗺️ 附近钓点地图</h3>
        <p style="font-size: 13px; color: var(--text-secondary); margin-bottom: 12px;">点击地图记录坐标，留言时粘贴坐标（格式：📍坐标：经度,纬度）</p>
        <div class="map-container">
            <div id="map"></div>
        </div>
    </div>

    <!-- 留言板 -->
    <div class="card">
        <h3 style="margin-bottom: 12px;">💬 钓友留言板 · 分享钓点鱼情</h3>
        <div class="message-board">
            <div class="message-list" id="messageList"><div style="text-align:center; padding:20px;">加载留言中...</div></div>
            <button class="post-btn" id="postMessageBtn">📝 发表留言（需 GitHub 账号）</button>
            <p style="font-size: 12px; color: var(--text-secondary); margin-top: 12px;">※ 点击按钮跳转到 GitHub Issue 页面，登录后即可留言</p>
        </div>
    </div>
    <footer>数据 Open-Meteo | 地图 高德地图 | 留言板基于 GitHub Issues + 云函数</footer>
</div>

<div id="dayModal" class="modal"><div class="modal-content"><span class="modal-close">&times;</span><div id="modalBody"></div></div></div>

<script>
    // ======================== 留言板配置 ========================
    const GITHUB_REPO = "Misaka-bilbil/fishing-weather";
    const ISSUE_NUMBER = 1;  // 请改成你实际的 Issue 编号
    const COMMENTS_API = `https://github-comments-proxy.vercel.app/api/comments?repo=${GITHUB_REPO}&issue=${ISSUE_NUMBER}`;
    const ISSUE_URL = `https://github.com/${GITHUB_REPO}/issues/${ISSUE_NUMBER}`;

    async function loadMessages() {
        try {
            const res = await fetch(COMMENTS_API);
            if (!res.ok) throw new Error(`HTTP ${res.status}`);
            const comments = await res.json();
            renderMessages(comments);
        } catch(e) {
            console.error("加载留言失败", e);
            document.getElementById('messageList').innerHTML = '<div style="text-align:center; padding:20px;">留言加载失败，请稍后重试</div>';
        }
    }

    function renderMessages(comments) {
        const container = document.getElementById('messageList');
        if (!comments || comments.length === 0) {
            container.innerHTML = '<div style="text-align:center; padding:20px;">暂无留言，快来发表第一条吧！</div>';
            return;
        }
        const html = comments.map(comment => {
            const date = new Date(comment.created_at);
            const timeStr = `${date.getMonth()+1}/${date.getDate()} ${date.getHours().toString().padStart(2,'0')}:${date.getMinutes().toString().padStart(2,'0')}`;
            let locationHtml = '';
            const coordMatch = comment.body.match(/📍坐标：([-\d.]+),([-\d.]+)/);
            if (coordMatch) {
                const lat = parseFloat(coordMatch[1]);
                const lng = parseFloat(coordMatch[2]);
                locationHtml = `<div class="message-location">📍 钓点坐标: ${lat.toFixed(4)}, ${lng.toFixed(4)} <span style="cursor:pointer; color:#007aff;" onclick="flyToLocation(${lat}, ${lng})">[查看地图]</span></div>`;
            }
            let content = comment.body.replace(/📍坐标：[\d\.,\-]+/, '').trim();
            if (!content) content = "(无文字内容)";
            return `<div class="message-item"><div class="message-header"><span class="message-nickname">${escapeHtml(comment.user.login)}</span><span class="message-time">${timeStr}</span></div><div class="message-content">${escapeHtml(content)}</div>${locationHtml}</div>`;
        }).join('');
        container.innerHTML = html;
    }

    function escapeHtml(str) { return str.replace(/[&<>]/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;'})[m]); }
    function openPostPage() { window.open(ISSUE_URL, '_blank'); }

    // ======================== 地图（高德中文 + 备选） ========================
    let map;
    let currentMapLat = 28.0027, currentMapLon = 120.5881;
    let tempMarker = null;

    function initMap(lat, lon) {
        if (map) { map.setView([lat, lon], 12); return; }
        // 高德地图瓦片（中文，国内稳定）
        const gaodeUrl = 'https://webrd02.is.autonavi.com/appmaptile?lang=zh_cn&size=1&scale=1&style=8&x={x}&y={y}&z={z}';
        const osmUrl = 'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png';
        const gaodeLayer = L.tileLayer(gaodeUrl, { attribution: '&copy; 高德地图', subdomains: '0123', maxZoom: 18 });
        const osmLayer = L.tileLayer(osmUrl, { attribution: '&copy; OpenStreetMap' });
        map = L.map('map').setView([lat, lon], 12);
        // 优先使用高德，如果加载失败则回退到OSM
        gaodeLayer.addTo(map);
        // 监听瓦片加载错误，回退
        gaodeLayer.on('tileerror', function() {
            console.warn('高德地图瓦片加载失败，切换到OSM');
            map.removeLayer(gaodeLayer);
            osmLayer.addTo(map);
        });
        map.on('click', function(e) {
            const { lat, lng } = e.latlng;
            if (tempMarker) map.removeLayer(tempMarker);
            tempMarker = L.marker([lat, lng]).addTo(map).bindPopup('坐标已复制，可粘贴到留言中').openPopup();
            const coordText = `📍坐标：${lat.toFixed(4)},${lng.toFixed(4)}`;
            navigator.clipboard.writeText(coordText).then(() => alert(`坐标已复制：${coordText}`)).catch(() => alert(`请手动记录：${coordText}`));
            setTimeout(() => { if (tempMarker) tempMarker.closePopup(); }, 4000);
        });
    }

    function flyToLocation(lat, lng) { if (map) map.flyTo([lat, lng], 15); }
    window.flyToLocation = flyToLocation;

    // ======================== 天气核心 ========================
    let currentLat = 28.0027, currentLon = 120.5881, currentCity = "温州市";
    let fullWeatherData = null;
    let multiChart = null;

    async function fetchWeatherWithRetry(lat, lon, retry = 1) {
        const url = `https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current_weather=true&hourly=pressure_msl,temperature_2m,relativehumidity_2m,windspeed_10m,precipitation&daily=weathercode,temperature_2m_max,temperature_2m_min,sunrise,sunset,uv_index_max&timezone=Asia/Shanghai&forecast_days=14`;
        try {
            const res = await fetch(url);
            if(!res.ok) throw new Error(`HTTP ${res.status}`);
            return await res.json();
        } catch(e) {
            if(retry > 0) { await new Promise(r => setTimeout(r, 1000)); return fetchWeatherWithRetry(lat, lon, retry - 1); }
            throw e;
        }
    }

    function getWeatherIcon(code) {
        const map = {0:"☀️",1:"🌤️",2:"⛅",3:"☁️",45:"🌫️",48:"🌫️",51:"🌦️",53:"🌦️",55:"🌦️",61:"🌧️",63:"🌧️",65:"🌧️",80:"🌦️",95:"⛈️"};
        return map[code] || "❓";
    }
    function getWeatherText(code) {
        const map = {0:"晴天",1:"晴间多云",2:"局部多云",3:"多云",45:"雾",48:"雾",51:"毛毛雨",53:"毛毛雨",55:"毛毛雨",61:"小雨",63:"中雨",65:"大雨",80:"阵雨",95:"雷暴"};
        return map[code] || "未知";
    }

    function calculateLureIndex(temp, wind, hum, press, trend) {
        let s = 45;
        if(temp>=16&&temp<=26) s+=16; else if(temp>30) s-=18; else if(temp<8) s-=22;
        if(wind>=3&&wind<=12) s+=14; else if(wind>28) s-=22;
        if(hum>=45&&hum<=70) s+=8; else if(hum>85) s-=16;
        if(trend==='falling') s+=22; else if(trend==='rising') s-=20;
        if(press>=995&&press<=1008) s+=10; else if(press>1018) s-=14;
        return Math.min(100, Math.max(0, Math.round(s)));
    }

    function getPressureTrend(hourlyPress, idx) {
        if(!hourlyPress || idx+3 >= hourlyPress.length) return 'stable';
        const now = hourlyPress[idx];
        const future = hourlyPress[idx+3];
        if(future < now) return 'falling';
        if(future > now) return 'rising';
        return 'stable';
    }

    function getLureAdvice(score) {
        if(score>=75) return "🔥 黄金窗口！鱼活跃，推荐水面系、米诺、VIB。";
        if(score>=60) return "👍 鱼情较好，亮片、软虫、小胖子。";
        if(score>=40) return "🤔 活性一般，精细作钓，小铅头钩、内德。";
        return "⚠️ 鱼口差，建议休息或夜钓。";
    }

    function getUVDescription(uv) {
        if(uv === undefined || uv === null) return "--";
        if(uv <= 2) return "低";
        if(uv <= 5) return "中等";
        if(uv <= 7) return "高";
        if(uv <= 10) return "非常高";
        return "极端";
    }

    function drawMultiChart(hourlyData, startIdx) {
        const ctx = document.getElementById('multiChart')?.getContext('2d');
        if(!ctx) return;
        const points = Math.min(24, hourlyData.time.length - startIdx);
        const labels = hourlyData.time.slice(startIdx, startIdx+points).map(t => t.split('T')[1].substring(0,5));
        const pressures = hourlyData.pressure_msl.slice(startIdx, startIdx+points);
        const temps = hourlyData.temperature_2m.slice(startIdx, startIdx+points);
        const precip = hourlyData.precipitation.slice(startIdx, startIdx+points);
        if(multiChart) multiChart.destroy();
        multiChart = new Chart(ctx, {
            type: 'line',
            data: {
                labels: labels,
                datasets: [
                    { label: '气压 (hPa)', data: pressures, borderColor: '#007aff', backgroundColor: 'transparent', yAxisID: 'y', tension: 0.3, fill: false },
                    { label: '温度 (°C)', data: temps, borderColor: '#ff9500', backgroundColor: 'transparent', yAxisID: 'y1', tension: 0.3, fill: false },
                    { label: '降水 (mm)', data: precip, type: 'bar', backgroundColor: '#34c759', yAxisID: 'y2', barPercentage: 0.8, categoryPercentage: 0.9 }
                ]
            },
            options: {
                responsive: true, maintainAspectRatio: true,
                interaction: { mode: 'index', intersect: false },
                plugins: { tooltip: { mode: 'index' }, legend: { position: 'top' } },
                scales: {
                    y: { title: { display: true, text: '气压 (hPa)' }, position: 'left' },
                    y1: { title: { display: true, text: '温度 (°C)' }, position: 'right', grid: { drawOnChartArea: false } },
                    y2: { title: { display: true, text: '降水 (mm)' }, position: 'right', grid: { drawOnChartArea: false }, min: 0 }
                }
            }
        });
        document.getElementById('windowTip').innerHTML = "🎣 窗口期: 5:00-8:00, 17:00-19:00  ·  气压下降时最佳";
    }

    // 节假日数据（同上一版，省略以节省篇幅，但保留）
    const holidays = {
        "2025-01-01": { name: "元旦", type: "holiday" },
        "2025-01-28": { name: "除夕", type: "holiday" }, "2025-01-29": { name: "春节", type: "holiday" }, "2025-01-30": { name: "春节", type: "holiday" }, "2025-01-31": { name: "春节", type: "holiday" }, "2025-02-01": { name: "春节", type: "holiday" }, "2025-02-02": { name: "春节", type: "holiday" }, "2025-02-03": { name: "春节调休", type: "work" },
        "2025-04-04": { name: "清明", type: "holiday" }, "2025-04-05": { name: "清明", type: "holiday" }, "2025-04-06": { name: "清明", type: "holiday" },
        "2025-05-01": { name: "劳动节", type: "holiday" }, "2025-05-02": { name: "劳动节", type: "holiday" }, "2025-05-03": { name: "劳动节", type: "holiday" }, "2025-05-04": { name: "劳动节", type: "holiday" }, "2025-05-05": { name: "劳动节", type: "holiday" },
        "2025-05-31": { name: "端午", type: "holiday" }, "2025-06-01": { name: "端午", type: "holiday" }, "2025-06-02": { name: "端午", type: "holiday" },
        "2025-10-01": { name: "国庆", type: "holiday" }, "2025-10-02": { name: "国庆", type: "holiday" }, "2025-10-03": { name: "国庆", type: "holiday" }, "2025-10-04": { name: "国庆", type: "holiday" }, "2025-10-05": { name: "国庆", type: "holiday" }, "2025-10-06": { name: "国庆", type: "holiday" }, "2025-10-07": { name: "国庆", type: "holiday" }, "2025-10-08": { name: "中秋", type: "holiday" },
        "2026-01-01": { name: "元旦", type: "holiday" },
        "2026-02-16": { name: "除夕", type: "holiday" }, "2026-02-17": { name: "春节", type: "holiday" }, "2026-02-18": { name: "春节", type: "holiday" }, "2026-02-19": { name: "春节", type: "holiday" }, "2026-02-20": { name: "春节", type: "holiday" }, "2026-02-21": { name: "春节", type: "holiday" }, "2026-02-22": { name: "春节", type: "holiday" },
        "2026-04-05": { name: "清明", type: "holiday" }, "2026-04-06": { name: "清明", type: "holiday" },
        "2026-05-01": { name: "劳动节", type: "holiday" }, "2026-05-02": { name: "劳动节", type: "holiday" }, "2026-05-03": { name: "劳动节", type: "holiday" },
        "2026-06-19": { name: "端午", type: "holiday" }, "2026-06-20": { name: "端午", type: "holiday" }, "2026-06-21": { name: "端午", type: "holiday" },
        "2026-10-01": { name: "国庆", type: "holiday" }, "2026-10-02": { name: "国庆", type: "holiday" }, "2026-10-03": { name: "国庆", type: "holiday" }, "2026-10-04": { name: "国庆", type: "holiday" }, "2026-10-05": { name: "国庆", type: "holiday" }, "2026-10-06": { name: "国庆", type: "holiday" }, "2026-10-07": { name: "国庆", type: "holiday" }, "2026-10-08": { name: "中秋", type: "holiday" }
    };
    function getHolidayTag(dateStr) {
        const info = holidays[dateStr];
        if (!info) return null;
        if (info.type === 'holiday') return { text: '休', color: '#ff3b30' };
        if (info.type === 'work') return { text: '班', color: '#ff9500' };
        return null;
    }

    function renderCalendar(daily, hourly) {
        const container = document.getElementById('calendarContainer');
        if (!container) return;
        let html = '';
        const daysToShow = Math.min(10, daily.time.length);
        for (let i = 0; i < daysToShow; i++) {
            const dateStr = daily.time[i];
            const d = new Date(dateStr);
            const weekdays = ['周日', '周一', '周二', '周三', '周四', '周五', '周六'];
            const monthDay = `${d.getMonth()+1}/${d.getDate()}`;
            const weekday = weekdays[d.getDay()];
            const tMax = daily.temperature_2m_max[i];
            const tMin = daily.temperature_2m_min[i];
            const weatherCode = daily.weathercode[i];
            const icon = getWeatherIcon(weatherCode);
            let dayScore = 50;
            const noonIdx = hourly.time.findIndex(t => t.includes(dateStr.split('T')[0]+'T12:00'));
            if (noonIdx !== -1) {
                dayScore = calculateLureIndex(hourly.temperature_2m[noonIdx], hourly.windspeed_10m[noonIdx], hourly.relativehumidity_2m[noonIdx], hourly.pressure_msl[noonIdx], 'stable');
            }
            const holiday = getHolidayTag(dateStr);
            html += `<div class="calendar-card" data-day-index="${i}"><div class="cal-date">${monthDay}</div><div class="cal-week">${weekday}</div><div class="cal-icon">${icon}</div><div class="cal-temp">${tMin}~${tMax}°C</div><div class="cal-score">🎣 ${dayScore}</div>${holiday ? `<div class="holiday-tag" style="background:${holiday.color};">${holiday.text}</div>` : ''}</div>`;
        }
        container.innerHTML = html;
        document.querySelectorAll('.calendar-card').forEach(card => {
            card.addEventListener('click', (e) => { const idx = card.getAttribute('data-day-index'); if (idx !== null) showDayDetail(parseInt(idx)); });
        });
    }

    async function showDayDetail(dayIndex) {
        if (!fullWeatherData) return;
        const daily = fullWeatherData.daily;
        const hourly = fullWeatherData.hourly;
        if (dayIndex >= daily.time.length) return;
        const dateStr = daily.time[dayIndex];
        const d = new Date(dateStr);
        const week = ['周日', '周一', '周二', '周三', '周四', '周五', '周六'][d.getDay()];
        const dateLabel = `${d.getFullYear()}年${d.getMonth()+1}月${d.getDate()}日 ${week}`;
        const tMax = daily.temperature_2m_max[dayIndex];
        const tMin = daily.temperature_2m_min[dayIndex];
        const weatherCode = daily.weathercode[dayIndex];
        const weatherIcon = getWeatherIcon(weatherCode);
        const weatherText = getWeatherText(weatherCode);
        let sunrise = '--', sunset = '--';
        if (daily.sunrise && daily.sunrise[dayIndex]) sunrise = daily.sunrise[dayIndex].split('T')[1];
        if (daily.sunset && daily.sunset[dayIndex]) sunset = daily.sunset[dayIndex].split('T')[1];
        let uv = daily.uv_index_max?.[dayIndex] || '--';
        const uvDesc = getUVDescription(uv);
        const dayStart = dateStr.split('T')[0];
        const hourlyIndices = [];
        for (let i = 0; i < hourly.time.length; i++) if (hourly.time[i].startsWith(dayStart)) hourlyIndices.push(i);
        const hourlyTemps = hourlyIndices.map(i => hourly.temperature_2m[i]);
        const hourlyPress = hourlyIndices.map(i => hourly.pressure_msl[i]);
        const hourlyPrecip = hourlyIndices.map(i => hourly.precipitation[i]);
        const hourLabels = hourlyIndices.map(i => hourly.time[i].split('T')[1].substring(0,5));
        let noonIdx = hourlyIndices.find(i => hourly.time[i].includes('T12:00'));
        let dayScore = 50;
        if (noonIdx !== undefined) dayScore = calculateLureIndex(hourly.temperature_2m[noonIdx], hourly.windspeed_10m[noonIdx], hourly.relativehumidity_2m[noonIdx], hourly.pressure_msl[noonIdx], 'stable');
        const modalBody = `<div style="margin-bottom:20px;"><div class="detail-grid"><div class="detail-item"><div class="detail-icon">${weatherIcon}</div><div class="detail-text"><h4>天气</h4><p>${weatherText}</p></div></div><div class="detail-item"><div class="detail-icon">🌡️</div><div class="detail-text"><h4>温度</h4><p>${tMin}~${tMax}°C</p></div></div><div class="detail-item"><div class="detail-icon">🌅</div><div class="detail-text"><h4>日出/日落</h4><p>${sunrise} / ${sunset}</p></div></div><div class="detail-item"><div class="detail-icon">☀️</div><div class="detail-text"><h4>紫外线</h4><p>${uv} ${uvDesc}</p></div></div><div class="detail-item"><div class="detail-icon">🎣</div><div class="detail-text"><h4>路亚指数</h4><p>${dayScore}</p></div></div></div><div class="chart-container" style="margin-top:16px;"><canvas id="dayChart" width="400" height="180"></canvas></div><div style="font-size:12px; text-align:center; margin-top:8px;">逐小时气压、温度、降水趋势</div></div>`;
        const modal = document.getElementById('dayModal');
        document.getElementById('modalBody').innerHTML = `<div class="modal-title" style="font-size:24px; font-weight:600; margin-bottom:20px;">📅 ${dateLabel}</div>` + modalBody;
        modal.style.display = 'flex';
        const ctx = document.getElementById('dayChart')?.getContext('2d');
        if (ctx) {
            if (window.dayChartInstance) window.dayChartInstance.destroy();
            window.dayChartInstance = new Chart(ctx, {
                type: 'line',
                data: { labels: hourLabels, datasets: [{ label: '气压 (hPa)', data: hourlyPress, borderColor: '#007aff', yAxisID: 'y', tension: 0.3, fill: false }, { label: '温度 (°C)', data: hourlyTemps, borderColor: '#ff9500', yAxisID: 'y1', tension: 0.3, fill: false }, { label: '降水 (mm)', data: hourlyPrecip, type: 'bar', backgroundColor: '#34c759', yAxisID: 'y2', barPercentage: 0.8 }] },
                options: { responsive: true, maintainAspectRatio: true, interaction: { mode: 'index', intersect: false }, scales: { y: { title: { display: true, text: '气压 (hPa)' }, position: 'left' }, y1: { title: { display: true, text: '温度 (°C)' }, position: 'right', grid: { drawOnChartArea: false } }, y2: { title: { display: true, text: '降水 (mm)' }, position: 'right', grid: { drawOnChartArea: false }, min: 0 } } }
            });
        }
    }

    async function renderUI(data, cityName) {
        fullWeatherData = data;
        const current = data.current_weather;
        const hourly = data.hourly;
        const daily = data.daily;
        if (!current || !hourly || !daily) throw new Error("数据不完整");
        const now = new Date();
        const hourStr = now.getFullYear()+'-'+String(now.getMonth()+1).padStart(2,'0')+'-'+String(now.getDate()).padStart(2,'0')+'T'+String(now.getHours()).padStart(2,'0')+':00';
        let idx = hourly.time.findIndex(t=>t===hourStr);
        if (idx===-1) idx=0;
        const press = hourly.pressure_msl[idx];
        const temp = current.temperature;
        const wind = current.windspeed;
        const hum = hourly.relativehumidity_2m[idx];
        const trend = getPressureTrend(hourly.pressure_msl, idx);
        const score = calculateLureIndex(temp, wind, hum, press, trend);
        const advice = getLureAdvice(score);
        let sunrise = '--', sunset = '--';
        if (daily.sunrise && daily.sunrise[0]) sunrise = daily.sunrise[0].split('T')[1];
        if (daily.sunset && daily.sunset[0]) sunset = daily.sunset[0].split('T')[1];
        let uvIndex = '--', uvDesc = '';
        if (daily.uv_index_max && daily.uv_index_max[0] !== undefined) { uvIndex = daily.uv_index_max[0]; uvDesc = getUVDescription(uvIndex); }
        const mainHtml = `<div class="card"><div class="location-title" style="font-size:24px; font-weight:600; margin-bottom:16px;">🎯 ${cityName} · 渔汛</div><div class="metrics-row"><div class="metric-card"><div class="metric-value">${score}</div><div class="metric-label">路亚指数</div></div><div class="metric-card"><div class="metric-value">${press} hPa</div><div class="metric-label">气压 ${trend==='falling'?'↓窗口期':(trend==='rising'?'↑谨慎':'→')}</div></div><div class="metric-card"><div class="metric-value">${temp}°C</div><div class="metric-label">气温</div></div></div><div class="detail-grid"><div class="detail-item"><div class="detail-icon">${getWeatherIcon(current.weathercode)}</div><div class="detail-text"><h4>天气</h4><p>${getWeatherText(current.weathercode)}</p></div></div><div class="detail-item"><div class="detail-icon">💨</div><div class="detail-text"><h4>风速</h4><p>${wind} km/h</p></div></div><div class="detail-item"><div class="detail-icon">💧</div><div class="detail-text"><h4>湿度</h4><p>${hum}%</p></div></div><div class="detail-item"><div class="detail-icon">🌅</div><div class="detail-text"><h4>日出/日落</h4><p>${sunrise} / ${sunset}</p></div></div><div class="detail-item"><div class="detail-icon">☀️</div><div class="detail-text"><h4>紫外线</h4><p>${uvIndex} ${uvDesc}</p></div></div></div><div class="chart-container"><canvas id="multiChart" width="400" height="200"></canvas><div id="windowTip" style="font-size:12px; text-align:center; margin-top:8px;"></div></div><div class="advice-block"><h3 style="font-size:16px; margin-bottom:8px;">🐟 鱼情分析</h3><div>${advice}</div></div></div><div class="card"><div class="calendar-title">📅 天气日历 <span style="font-size:13px; color:var(--text-secondary);">(点击查看详情)</span></div><div class="calendar-scroll" id="calendarContainer"></div></div>`;
        document.getElementById('mainContent').innerHTML = mainHtml;
        drawMultiChart(hourly, idx);
        renderCalendar(daily, hourly);
    }

    async function loadWeather(city) {
        const mainDiv = document.getElementById('mainContent');
        mainDiv.innerHTML = '<div class="card"><div class="skeleton" style="height: 400px;"></div></div>';
        try {
            const geoUrl = `https://geocoding-api.open-meteo.com/v1/search?name=${encodeURIComponent(city)}&count=1&language=zh`;
            const geoRes = await fetch(geoUrl);
            const geoData = await geoRes.json();
            if (!geoData.results || geoData.results.length === 0) throw new Error(`未找到城市“${city}”`);
            const { latitude, longitude, name, admin1 } = geoData.results[0];
            currentLat = latitude; currentLon = longitude;
            currentCity = `${name}${admin1 ? '·'+admin1 : ''}`;
            const weather = await fetchWeatherWithRetry(currentLat, currentLon, 1);
            await renderUI(weather, currentCity);
            if (map) map.setView([currentLat, currentLon], 12);
            else initMap(currentLat, currentLon);
        } catch(e) {
            console.error(e);
            mainDiv.innerHTML = `<div class="card"><div>⚠️ 加载失败: ${e.message}<br>已回退至温州市</div></div>`;
            if (city !== "温州市") loadWeather("温州市");
        }
    }

    // 下拉刷新
    let startY = 0;
    document.body.addEventListener('touchstart', (e) => { startY = e.touches[0].clientY; });
    document.body.addEventListener('touchmove', (e) => {
        const moveY = e.touches[0].clientY;
        if (moveY - startY > 60 && window.scrollY === 0) document.getElementById('refreshIndicator').style.opacity = '1';
    });
    document.body.addEventListener('touchend', () => {
        if (document.getElementById('refreshIndicator').style.opacity === '1') {
            loadWeather(document.getElementById('cityInput').value.trim() || "温州市");
            document.getElementById('refreshIndicator').style.opacity = '0';
        }
    });

    // 暗黑模式
    const darkToggle = document.getElementById('darkToggle');
    darkToggle.addEventListener('click', () => {
        document.body.classList.toggle('dark');
        const isDark = document.body.classList.contains('dark');
        darkToggle.textContent = isDark ? '☀️ 明亮' : '🌙 暗黑';
        document.getElementById('themeColor').setAttribute('content', isDark ? '#1c1c1e' : '#f5f5f7');
        if (multiChart) multiChart.update();
    });

    // 模态框关闭
    const modal = document.getElementById('dayModal');
    document.querySelector('.modal-close')?.addEventListener('click', () => { modal.style.display = 'none'; });
    window.onclick = (e) => { if (e.target === modal) modal.style.display = 'none'; };

    // 发表留言按钮
    document.getElementById('postMessageBtn').onclick = openPostPage;

    // 初始化
    loadWeather("温州市");
    loadMessages();
    setInterval(loadMessages, 60000);
</script>
</body>
</html>
